<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Emma Kernel — Console</title>
  <style>
    body { font-family: sans-serif; margin: 2rem; }
    h1 { margin-bottom: 1rem; }
    .badge {
      display: inline-block;
      padding: 0.2rem 0.5rem;
      border-radius: 0.5rem;
      font-size: 0.8rem;
      font-weight: bold;
      background: #e5e7eb;
      color: #111827;
    }
    .btn {
      display: inline-block;
      margin: 0.25rem;
      padding: 0.4rem 0.8rem;
      border-radius: 0.4rem;
      background: #111;
      color: #fff;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }
    .btn:disabled {
      opacity: .5;
      cursor: not-allowed;
    }
    .muted { color: #6b7280; }
    pre {
      background: #f3f4f6;
      padding: 0.5rem;
      border-radius: 0.4rem;
      font-size: 0.85rem;
      max-height: 200px;
      overflow-y: auto;
    }
    .card {
      border: 1px solid #e5e7eb;
      border-radius: 0.6rem;
      padding: 1rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <h1>Emma Kernel — Console</h1>
  <div id="status"></div>
  <h3>Audit (ultime righe)</h3>
  <button class="btn" onclick="loadAudit()">Aggiorna</button>
  <pre id="audit">Loading…</pre>
  <div id="proposals"></div>

<script>
async function load() {
  const r = await fetch('/kernel/status');
  const s = await r.json();

  const statusEl = document.getElementById('status');
  statusEl.innerHTML = `
    <b>State:</b> <span class="badge">${s.state || 'IDLE'}</span>
    — <b>Open proposals:</b> ${(s.openProposals && s.openProposals.length) || 0}
    &nbsp;&nbsp;
    <button class="btn" style="background:#b91c1c" onclick="doKill()">Kill switch</button>
    ${s.stopped ? '<span class="badge" style="background:#fee2e2;color:#991b1b;margin-left:8px">STOPPED</span>' : ''}
    <!-- ${s.stopped ? '<button class="btn" style="background:#16a34a" onclick="doResume()">Resume</button>' : ''} -->
  `;

  const proposalsEl = document.getElementById('proposals');
  proposalsEl.innerHTML = '';
  if (s.openProposals && s.openProposals.length > 0) {
    for (const p of s.openProposals) {
      const st = s.proposalStates && s.proposalStates[p.id] || 'UNKNOWN';
      const disabled = s.stopped ? 'disabled' : '';
      const d = document.createElement('div');
      d.className = 'card';
      d.innerHTML = `
        <h3 style="margin:0 0 8px 0">${p.id} <span class="badge">${st}</span></h3>
        <p class="muted" style="margin:0 0 12px 0"><b>Objective:</b> ${p.objective || '-'}</p>
        <button class="btn" ${disabled} onclick="approve('${p.id}','YES')">YES</button>
        <button class="btn" ${disabled} onclick="approve('${p.id}','NO')">NO</button>
      `;
      proposalsEl.appendChild(d);
    }
  } else {
    proposalsEl.innerHTML = '<p class="muted">Nessuna proposta aperta.</p>';
  }

  loadAudit();
}

async function approve(id, v) {
  await fetch('/kernel/proposals/' + id + '/approve', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(v)
  });
  load();
}

async function doKill() {
  if (!confirm('Confermi il KILL SWITCH?')) return;
  await fetch('/kernel/killswitch', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
  load();
}

// se vuoi attivare resume

async function doResume() {
  await fetch('/kernel/resume', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
  load();
}


async function loadAudit() {
  const r = await fetch('/kernel/audit/tail?n=10');
  const a = await r.json();
  document.getElementById('audit').textContent = JSON.stringify(a.lines || a, null, 2);
}

load();
</script>
</body>
</html>
